name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (capture logs)
        id: build_apk
        run: |
          flutter build apk --release 2>&1 | tee build_log.txt
          echo "${PIPESTATUS[0]}" > build_exit_code
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beam-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Fail job if build failed
        if: always()
        run: |
          if [ -f build_exit_code ] && [ "$(cat build_exit_code)" != "0" ]; then
            echo "Build failed — see build-log artifact"
            exit 1
          fi
